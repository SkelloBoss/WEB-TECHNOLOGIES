<!DOCTYPE html>
<html>
<head>
    <title>Registration Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <div class="logo">TechFlow</div>
        <button class="login-btn">
            <a href="labTask01_Login_Page.html">Login</a>
        </button>
        <button class="register-btn">Registration</button>
    </div>

    <div class="right">
        <div class="form-box">

            <input type="email">

                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
                <option>Other</option>
            </select>
            <button class="submit-btn-reg">Register</button>
        </div>
    </div>

</div>

</html>
