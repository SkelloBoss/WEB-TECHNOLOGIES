<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <div class="logo">TechFlow</div>
        <button class="login-btn" id="LBtn">Login</button>
        <button class="register-btn" id="RBtn">
            <a href="labTask01_Registration_Page.html">Registration</a>
        </button>
    </div>

    <div class="right">
        <div class="form-box">
            <h2 class="CA">Login</h2>
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email">
            <label>Password</label>
            <input type="password" placeholder="Enter your password">
            <button class="submit-btn-log">Sign In</button>
        </div>
    </div>

</div>

</body>
</html>
